<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="mobile-web-app-capable" content="yes" />
  <meta name="theme-color" content="#1A1A2E" />
  <title>Lootzy</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body, #root {
      width: 100%; height: 100%; height: 100dvh;
      overflow: hidden;
      background: #1A1A2E;
      -webkit-tap-highlight-color: transparent;
      -webkit-touch-callout: none;
      user-select: none;
    }
    #loading {
      position: fixed; inset: 0;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      background: #1A1A2E;
      color: #B4FF00;
      font-family: system-ui, sans-serif;
      font-size: 18px;
      gap: 16px;
      z-index: 9999;
    }
    .ld-dot {
      display: inline-block;
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #B4FF00;
      animation: ldpulse 1s ease-in-out infinite;
    }
    .ld-dot:nth-child(2){ animation-delay: .15s }
    .ld-dot:nth-child(3){ animation-delay: .30s }
    @keyframes ldpulse {
      0%,80%,100% { transform: scale(0); opacity: .4 }
      40%          { transform: scale(1); opacity: 1  }
    }
  </style>
</head>
<body>
  <div id="loading">
    <div style="font-size:36px">🎮</div>
    <div>Lootzy đang tải...</div>
    <div style="display:flex;gap:6px;margin-top:4px">
      <span class="ld-dot"></span>
      <span class="ld-dot"></span>
      <span class="ld-dot"></span>
    </div>
  </div>
  <div id="root"></div>

  <!-- React 18 UMD — works on ALL iOS Safari versions -->
  <script crossorigin src="https://unpkg.com/react@18.3.1/umd/react.production.min.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.production.min.js"></script>

  <!-- require() shim so IIFE bundle can resolve React/ReactDOM -->
  <script>
    window.require = function(id) {
      if (id === 'react')              return window.React;
      if (id === 'react-dom')          return window.ReactDOM;
      if (id === 'react-dom/client')   return window.ReactDOM;
      throw new Error('Unknown module: ' + id);
    };
  </script>

  <!-- Game bundle (IIFE) — self-mounts into #root -->
  <script src="./lootzy-bundle.js"></script>
</body>
</html>
